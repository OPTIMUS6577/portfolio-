<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Hub | Executive Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #03030b;
    --card: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.08);
    --accent: #bc13fe;
    --accent-glow: rgba(188, 19, 254, 0.3);
    --accent2: #4e9ddd;
    --text: #ffffff;
    --muted: #808090;
    --success: #00ffaa;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    transition: 0.3s;
    overflow-x: hidden;
}

/* Glassmorphism Background */
.bg-glow {
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    filter: blur(100px);
    z-index: -1;
    top: -200px;
    right: -200px;
}

#login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(circle at center, #0a0a1a 0%, #03030b 100%);
}

.login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 4rem;
    width: 90%;
    max-width: 450px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.login-box h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    letter-spacing: 2px;
}

.login-box h1 span { color: var(--accent); }

.login-box p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
}

.login-box input {
    width: 100%;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem;
    color: var(--text);
    margin-bottom: 1.5rem;
    outline: none;
    font-family: inherit;
    text-align: center;
    font-size: 1.1rem;
    transition: 0.3s;
}

.login-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
}

.login-box button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 1.2rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.3s;
}

.login-box button:hover {
    box-shadow: 0 0 30px var(--accent-glow);
    transform: translateY(-2px);
}

/* Dashboard UI */
#dashboard {
    display: none;
    animation: fadeIn 0.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.topbar {
    background: rgba(3, 3, 11, 0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-logo {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 1px;
}

.topbar-logo span { color: var(--accent); }

.controls { display: flex; gap: 1rem; align-items: center; }

.ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.7rem;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

.content { padding: 3rem 5%; max-width: 1400px; margin: 0 auto; }

.header-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3rem;
}

.page-title { font-family: 'Outfit', sans-serif; font-size: 2.5rem; }
.page-title span { color: var(--accent); }

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    margin-bottom: 4rem;
}

.stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2rem;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

.stat-card:hover { border-color: var(--accent); transform: translateY(-5px); }

.stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 4px; height: 100%;
    background: var(--accent);
}

.stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 1rem;
}

.stat-value {
    font-size: 3rem;
    font-weight: 800;
    font-family: 'Outfit', sans-serif;
}

.table-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 32px;
    overflow: hidden;
    backdrop-filter: blur(10px);
}

table { width: 100%; border-collapse: collapse; }

th {
    text-align: left;
    padding: 1.5rem 2rem;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(255,255,255,0.02);
}

td {
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 1rem;
}

.badge {
    background: rgba(188, 19, 254, 0.1);
    color: var(--accent);
    padding: 0.5rem 1.2rem;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 700;
    border: 1px solid rgba(188, 19, 254, 0.2);
}

.btn-delete {
    background: rgba(255, 77, 77, 0.1);
    color: #ff4d4d;
    border: 1px solid rgba(255, 77, 77, 0.2);
    padding: 0.6rem;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-delete:hover { background: #ff4d4d; color: #fff; }

@media (max-width: 768px) {
    .header-flex { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .page-title { font-size: 2rem; }
    .content { padding: 1.5rem; }
}

/* Lang Selector Styles */
.lang-selector {
    display: flex;
    gap: 0.5rem;
    background: rgba(255, 255, 255, 0.05);
    padding: 0.3rem;
    border-radius: 12px;
    border: 1px solid var(--border);
}
.lang-item {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.4rem 0.8rem;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    transition: 0.3s;
}
.lang-item.active {
    background: var(--accent);
    color: white;
}
</style>
</head>
<body>
    <!-- PAGE LOADER -->
    <div id="page-loader" style="position:fixed;inset:0;background:#03030b;z-index:9999;display:flex;align-items:center;justify-content:center;transition:0.5s;">
        <div style="width:50px;height:50px;border:3px solid rgba(188,19,254,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;box-shadow:0 0 15px var(--accent-glow);"></div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div class="bg-glow"></div>

<div id="login-screen">
    <div class="login-box">
        <h1>WORK<span>HUB</span></h1>
        <p id="txt-login-sub">DASHBOARD ACCESS</p>
        <input type="password" id="admin-pass" placeholder="Security Token" onkeypress="if(event.key==='Enter') verifyAdmin()">
        <button onclick="verifyAdmin()" id="btn-login">AUTHORIZE</button>
        <div id="login-error" style="color:#ff4d4d;font-size:0.8rem;margin-top:1.5rem;display:none">Access Denied!</div>
    </div>
</div>

<div id="dashboard">
    <div class="topbar">
        <div class="topbar-logo">WORK<span>HUB</span> <b style="opacity:0.3;font-size:0.7rem;margin-left:10px">SYSTEMS</b></div>
        <div class="controls">
            <div class="lang-selector">
                <span onclick="changeLang('uz')" class="lang-item active" id="lang-uz-admin">Uzbek</span>
                <span onclick="changeLang('ru')" class="lang-item" id="lang-ru-admin">Rus</span>
                <span onclick="changeLang('en')" class="lang-item" id="lang-en-admin">Ingliz</span>
            </div>
            <button class="ctrl-btn" onclick="window.location.href='index.html'" id="btn-back-main">🏠 Dashboard</button>
            <button class="ctrl-btn" onclick="location.reload()" title="Logout">Logout 🚪</button>
        </div>
    </div>

    <div class="content">
        <div class="header-flex">
            <h1 class="page-title" id="txt-dash-title">Command <span>Center</span></h1>
            <div style="color: var(--muted); font-size: 0.9rem" id="current-date"></div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label" id="txt-total">Total Inquiries</div>
                <div class="stat-value" id="total-val" style="color:var(--accent)">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="txt-today">New Today</div>
                <div class="stat-value" id="today-val" style="color:var(--success)">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">System Status</div>
                <div class="stat-value" style="font-size: 1.5rem; color: var(--success)">● OPERATIONAL</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th id="th-name">Client Name</th>
                        <th id="th-phone">Contact</th>
                        <th id="th-service">Service Request</th>
                        <th id="th-date">Timestamp</th>
                        <th style="text-align:right">Action</th>
                    </tr>
                </thead>
                <tbody id="orders-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const DB_NAME = 'workhub_orders';
let currentLang = 'uz';

const TRANSLATIONS = {
    uz: {
        login_sub: 'DASHBOARDGA KIRISH',
        login_btn: 'TASDIQLASH',
        dash_title: 'Boshqaruv <span>Markazi</span>',
        total: 'JAMI BUYURTMALAR',
        today: 'YANGI (BUGUN)',
        name: 'MIJOZ ISMI',
        phone: 'ALOQA',
        service: 'XIZMAT TURI',
        date: 'SANA VA VAQT',
        empty: "Hozircha ma'lumotlar yo'q",
        back: '🏠 Dashboard\'ga qaytish'
    },
    ru: {
        login_sub: 'ДОСТУП К ПАНЕЛИ',
        login_btn: 'АВТОРИЗОВАТЬ',
        dash_title: 'Командный <span>Центр</span>',
        total: 'ВСЕГО ЗАЯВОК',
        today: 'НОВЫЕ СЕГОДНЯ',
        name: 'ИМЯ КЛИЕНТА',
        phone: 'КОНТАКТ',
        service: 'УСЛУГА',
        date: 'ДАТА И ВРЕМЯ',
        empty: 'Данных пока нет',
        back: '🏠 Вернуться на главную'
    },
    en: {
        login_sub: 'DASHBOARD ACCESS',
        login_btn: 'AUTHORIZE',
        dash_title: 'Command <span>Center</span>',
        total: 'TOTAL INQUIRIES',
        today: 'NEW TODAY',
        name: 'CLIENT NAME',
        phone: 'CONTACT',
        service: 'SERVICE REQUEST',
        date: 'TIMESTAMP',
        empty: 'No data available yet',
        back: '🏠 Back to Dashboard'
    }
};

window.addEventListener('load', () => {
    const loader = document.getElementById('page-loader');
    if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
    }
});

document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

function changeLang(lang) {
    currentLang = lang;
    const t = TRANSLATIONS[lang];
    
    // Update active state in UI
    document.querySelectorAll('.lang-item').forEach(el => el.classList.remove('active'));
    const activeEl = document.getElementById(`lang-${lang}-admin`);
    if(activeEl) activeEl.classList.add('active');

    document.getElementById('txt-login-sub').textContent = t.login_sub;
    document.getElementById('btn-login').textContent = t.login_btn;
    document.getElementById('txt-dash-title').innerHTML = t.dash_title;
    document.getElementById('txt-total').textContent = t.total;
    document.getElementById('txt-today').textContent = t.today;
    document.getElementById('th-name').textContent = t.name;
    document.getElementById('th-phone').textContent = t.phone;
    document.getElementById('th-service').textContent = t.service;
    document.getElementById('th-date').textContent = t.date;
    const backBtn = document.getElementById('btn-back-main');
    if(backBtn) backBtn.textContent = t.back;
    renderData();
}

function verifyAdmin() {
    if(document.getElementById('admin-pass').value === '7777') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderData();
    } else {
        document.getElementById('login-error').style.display = 'block';
        setTimeout(() => document.getElementById('login-error').style.display = 'none', 2000);
    }
}

function renderData() {
    const raw = localStorage.getItem(DB_NAME);
    const orders = raw ? JSON.parse(raw) : [];
    document.getElementById('total-val').textContent = orders.length;
    const today = new Date().toLocaleDateString();
    document.getElementById('today-val').textContent = orders.filter(o => new Date(o.date).toLocaleDateString() === today).length;

    const list = document.getElementById('orders-list');
    if(orders.length === 0) {
        list.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:5rem;color:var(--muted)">${TRANSLATIONS[currentLang].empty}</td></tr>`;
        return;
    }

    const smap = {site:'Sayt', bot:'Bot', app:'Ilova', game:'O\'yin', ai:'AI', creative:'Kreativ', dev:'Development', intel:'Smart AI', network:'Nexus'};

    list.innerHTML = orders.reverse().map(o => `
        <tr>
            <td style="font-weight:700">${o.name}</td>
            <td style="color:var(--accent2)">${o.phone}</td>
            <td><span class="badge">${smap[o.service] || o.service}</span></td>
            <td style="color:var(--muted);font-size:0.85rem">${new Date(o.date).toLocaleString()}</td>
            <td style="text-align:right">
                <button class="btn-delete" onclick="removeItem(${o.id})">🗑 Delete</button>
            </td>
        </tr>
    `).join('');
}

function removeItem(id) {
    if(!confirm('O\'chirilsinmi?')) return;
    let orders = JSON.parse(localStorage.getItem(DB_NAME) || '[]');
    orders = orders.filter(o => o.id !== id);
    localStorage.setItem(DB_NAME, JSON.stringify(orders));
    renderData();
}

// Default to UZ translations
changeLang('uz');
</script>
</body>
</html>
