[build]
  publish = "."

# Workhub sahifasini o'tkazib yubor
[[redirects]]
  from = "/workhub"
  to = "/workhub/index.html"
  status = 200

[[redirects]]
  from = "/workhub/*"
  to = "/workhub/:splat"
  status = 200

# Admin panelni o'tkazib yubor
[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200

# Portfolio uchun SPA redirect (faqat asosiy sahifa)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
